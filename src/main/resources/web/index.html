<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOTS</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           ROOTS — Swiss Bioluminescent
           Single-file stylesheet for the web frontend.
           ============================================================ */

        :root {
            /* Surfaces — pushed toward true black for crisper contrast */
            --soil:        #050609;
            --soil-raised: #0C0E13;
            --loam:        #14161B;
            --stone:       #21242B;

            /* Foreground */
            --bone:  #E8E6E1;
            --ash:   #9A9994;
            --dust:  #5E5C58;

            /* Bioluminescent accents */
            --mint:   #7FFFB0;
            --coral:  #FF6B5B;
            --cyan:   #9FE8FF;
            --amber:  #FFD66B;
            --lilac:  #C9A8FF;

            /* Type scale (perfect fourth: 1.333) */
            --text-xs:  10px;
            --text-sm:  12px;
            --text-base: 14px;
            --text-lg:  18px;
            --text-xl:  24px;
            --text-2xl: 32px;
            --text-3xl: 42px;
            --text-4xl: 56px;
            --text-5xl: 75px;

            --font-mono:  'JetBrains Mono', 'Menlo', monospace;
            --font-serif: 'Instrument Serif', 'Georgia', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--soil);
            color: var(--bone);
            font-family: var(--font-mono);
            font-size: var(--text-base);
            line-height: 1.6;
            overflow: hidden;
            margin: 0;
        }

        /* ---- Login screen ---- */

        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #login-screen.hidden {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none;
        }

        .login-card {
            width: 420px;
            padding: 56px 48px;
            border: 1px solid var(--loam);
            background: var(--soil);
            position: relative;
            z-index: 2;
        }

        .login-wordmark {
            font-family: var(--font-serif);
            font-size: var(--text-5xl);
            color: var(--bone);
            line-height: 1;
            margin-bottom: 8px;
            text-shadow:
                0 0 30px rgba(232, 230, 225, 0.25),
                0 0 80px rgba(201, 168, 255, 0.15);
        }

        .login-tagline {
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .field-group {
            margin-bottom: 28px;
        }

        .field-label {
            display: block;
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .field-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--loam);
            color: var(--bone);
            font-family: var(--font-mono);
            font-size: var(--text-base);
            padding: 10px 0;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .field-input:focus {
            border-bottom-color: var(--mint);
            box-shadow: 0 1px 0 0 var(--mint), 0 2px 14px -4px rgba(127, 255, 176, 0.45);
        }
        .field-input::placeholder {
            color: var(--dust);
        }

        .login-btn {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: 1px solid var(--mint);
            color: var(--mint);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s ease, color 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            margin-top: 8px;
            text-shadow: 0 0 12px rgba(127, 255, 176, 0.4);
        }
        .login-btn:hover {
            background: linear-gradient(135deg, var(--mint) 0%, var(--cyan) 50%, var(--lilac) 100%);
            color: var(--soil);
            border-color: transparent;
            box-shadow:
                0 0 24px rgba(127, 255, 176, 0.5),
                0 0 48px rgba(159, 232, 255, 0.35),
                0 0 72px rgba(201, 168, 255, 0.25);
            text-shadow: none;
        }
        .login-btn:active {
            transform: scale(0.98);
        }

        /* Google OAuth button — sits below the password submit */
        .oauth-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 22px 0 14px;
            color: var(--ash);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }
        .oauth-divider::before,
        .oauth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--loam);
        }
        .google-btn {
            width: 100%;
            padding: 13px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--bone);
            color: #1f1f1f;
            border: 1px solid var(--bone);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .google-btn:hover {
            background: #fff;
            transform: translateY(-1px);
        }
        .google-btn:active {
            transform: translateY(0);
        }

        /* Fresh-account welcome banner — shown when a user signs in
           via Google for the first time and a Roots account was created. */
        .fresh-welcome {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 420px;
            background: var(--soil-raised);
            border: 1px solid var(--mint);
            border-left-width: 2px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            animation: fresh-welcome-in 0.4s ease-out;
        }
        .fresh-welcome-inner {
            padding: 22px 26px;
        }
        .fresh-welcome-title {
            font-family: var(--font-serif);
            font-size: 20px;
            color: var(--mint);
            margin-bottom: 10px;
            letter-spacing: 0.01em;
        }
        .fresh-welcome-body {
            font-size: 13px;
            line-height: 1.6;
            color: var(--bone);
            margin-bottom: 18px;
        }
        .fresh-welcome-actions {
            display: flex;
            gap: 10px;
        }
        @keyframes fresh-welcome-in {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* Gmail Stripe scanner — modal + candidate list */
        .gmail-scan-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .gmail-scan-modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gmail-scan-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }
        .gmail-scan-dialog {
            position: relative;
            background: var(--soil);
            border: 1px solid var(--loam);
            width: min(720px, 92vw);
            max-height: 82vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }
        .gmail-scan-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 28px;
            border-bottom: 1px solid var(--loam);
        }
        .gmail-scan-title {
            font-family: var(--font-serif);
            font-size: 22px;
            color: var(--bone);
        }
        .gmail-scan-close {
            background: none;
            border: none;
            color: var(--ash);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            padding: 0 6px;
        }
        .gmail-scan-close:hover { color: var(--bone); }
        .gmail-scan-body {
            overflow-y: auto;
            padding: 24px 28px;
            flex: 1;
        }
        .gmail-scan-loading,
        .gmail-scan-empty,
        .gmail-scan-error,
        .gmail-scan-success {
            font-size: 14px;
            color: var(--bone);
            line-height: 1.6;
            padding: 40px 20px;
            text-align: center;
        }
        .gmail-scan-error { color: var(--coral); }
        .gmail-scan-success { color: var(--mint); }
        .gmail-scan-sub,
        .gmail-scan-hint {
            font-size: 12px;
            color: var(--dust);
            margin-top: 8px;
            display: block;
        }
        .gmail-scan-summary {
            font-size: 13px;
            color: var(--bone);
            padding-bottom: 16px;
            border-bottom: 1px solid var(--loam);
            margin-bottom: 16px;
        }
        .gmail-scan-warn {
            color: var(--amber);
            font-size: 11px;
            margin-left: 8px;
        }
        .gmail-candidate-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .gmail-candidate-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border: 1px solid var(--loam);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .gmail-candidate-row:hover {
            border-color: var(--stone);
            background: var(--soil-raised);
        }
        .gmail-candidate-row.existing {
            opacity: 0.55;
        }
        .gmail-candidate-row input[type=checkbox] {
            accent-color: var(--mint);
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .gmail-candidate-main { flex: 1; }
        .gmail-candidate-name {
            font-family: var(--font-serif);
            font-size: 15px;
            color: var(--bone);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .gmail-candidate-meta {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--dust);
            margin-top: 4px;
            letter-spacing: 0.03em;
        }
        .gmail-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 2px 8px;
            border: 1px solid currentColor;
        }
        .gmail-tag-new      { color: var(--mint); }
        .gmail-tag-existing { color: var(--ash); }
        .gmail-scan-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid var(--loam);
        }

        .login-error {
            color: var(--coral);
            font-size: var(--text-xs);
            margin-top: 16px;
            min-height: 18px;
            letter-spacing: 0.05em;
        }

        .login-hint {
            font-size: var(--text-xs);
            color: var(--dust);
            margin-top: 40px;
            text-align: center;
        }

        /* ---- Guilloché background ---- */

        #guilloche {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.45;
        }

        /* ---- App shell (shown after login) ---- */

        #app-shell {
            display: none;
            height: 100vh;
            width: 100vw;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            z-index: 10;
            background: var(--soil);
        }
        #app-shell.visible {
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: 60px minmax(0, 1fr);
            opacity: 1;
        }

        /* Top bar */
        .topbar {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-bottom: 1px solid var(--loam);
            gap: 16px;
        }
        .topbar-wordmark {
            font-family: var(--font-serif);
            font-size: var(--text-xl);
            color: var(--bone);
        }
        .topbar-sep {
            color: var(--dust);
        }
        .topbar-tagline {
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.1em;
        }
        .topbar-spacer { flex: 1; }
        .topbar-user {
            font-size: var(--text-xs);
            color: var(--ash);
        }
        .topbar-logout {
            background: none;
            border: none;
            color: var(--ash);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            cursor: pointer;
            padding: 6px 12px;
            transition: color 0.2s;
        }
        .topbar-logout:hover { color: var(--bone); }

        /* Sidebar nav */
        .sidebar {
            border-right: 1px solid var(--loam);
            padding: 32px 0;
            overflow-y: auto;
        }
        .nav-header {
            font-size: var(--text-xs);
            color: var(--dust);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 20px 24px 8px;
        }
        .nav-item {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            border-left: 2px solid transparent;
            color: var(--ash);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            padding: 12px 24px;
            cursor: pointer;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        .nav-item:hover {
            color: var(--bone);
            background: var(--soil-raised);
        }
        .nav-item.active {
            color: var(--bone);
            background: var(--soil-raised);
            border-left-color: var(--bone);
        }

        /* Content area */
        .content {
            overflow-y: auto;
            overflow-x: hidden;
            padding: 48px 64px 64px 64px;
            min-height: 0;
            min-width: 0;
        }
        .content::-webkit-scrollbar {
            width: 8px;
        }
        .content::-webkit-scrollbar-track {
            background: transparent;
        }
        .content::-webkit-scrollbar-thumb {
            background: var(--stone);
        }
        .content::-webkit-scrollbar-thumb:hover {
            background: var(--ash);
        }

        /* Sidebar also needs min-height:0 to allow its own overflow */
        .sidebar {
            min-height: 0;
        }

        /* ---- Loading placeholder ---- */
        .content-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--dust);
            font-size: var(--text-sm);
        }
        /* ============================================================
           Tables, forms, modals, reports
           ============================================================ */

        .page-header {
            margin-bottom: 40px;
        }
        .page-title {
            font-family: var(--font-serif);
            font-size: var(--text-4xl);
            color: var(--bone);
            line-height: 1.05;
            letter-spacing: -0.01em;
        }
        .page-subtitle {
            color: var(--ash);
            font-style: italic;
            margin-top: 8px;
            font-size: var(--text-sm);
            letter-spacing: 0.01em;
        }
        .page-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 56px;
            align-items: start;
        }

        /* Joy Score v2 formula card */
        .formula-card {
            border: 1px solid var(--loam);
            padding: 24px 28px;
            margin-bottom: 28px;
            background: var(--soil-raised);
        }
        .formula-title {
            font-size: 10px;
            color: var(--ash);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .formula-body {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--bone);
            line-height: 1.7;
            margin-bottom: 14px;
        }
        .formula-body .weight {
            color: var(--mint);
            font-weight: 500;
        }
        .formula-hint {
            font-size: var(--text-xs);
            color: var(--dust);
            line-height: 1.7;
            max-width: 720px;
        }

        /* Audit log toolbar — verify chain button + hint */
        .audit-toolbar {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--loam);
        }
        .audit-hint {
            font-size: var(--text-xs);
            color: var(--dust);
            letter-spacing: 0.03em;
            font-style: italic;
        }

        /* CRUD search toolbar — lives above the table */
        .crud-toolbar {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--loam);
        }
        .crud-search {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--loam);
            color: var(--bone);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            padding: 10px 0;
            outline: none;
            transition: border-bottom-color 0.25s, box-shadow 0.25s;
        }
        .crud-search:focus {
            border-bottom-color: var(--mint);
            box-shadow: 0 1px 0 0 var(--mint), 0 2px 14px -4px rgba(127, 255, 176, 0.35);
        }
        .crud-search::placeholder {
            color: var(--dust);
        }
        .crud-search-count {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Tables */
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
        }
        .table thead th {
            text-align: left;
            font-weight: 400;
            color: var(--ash);
            font-size: var(--text-xs);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 14px 12px;
            border-bottom: 1px solid var(--loam);
        }
        .table tbody td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--loam);
            color: var(--bone);
            transition: background 0.15s;
        }
        .table tbody tr {
            cursor: pointer;
        }
        .table tbody tr:hover td {
            background: var(--soil-raised);
            color: var(--bone);
        }
        .table tbody tr:hover td:first-child {
            box-shadow: inset 3px 0 0 0 var(--mint);
        }
        .table tbody tr.selected td {
            background: var(--soil-raised);
            color: var(--bone);
        }
        .table tbody tr.selected td:first-child {
            box-shadow: inset 3px 0 0 0 var(--bone);
        }
        .num { font-variant-numeric: tabular-nums; }
        .right { text-align: right; }

        /* Chips */
        .chip {
            display: inline-block;
            padding: 2px 10px;
            border: 1px solid var(--ash);
            color: var(--ash);
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: transparent;
        }
        .chip-thriving { border-color: var(--mint);  color: var(--mint);  }
        .chip-steady   { border-color: var(--cyan);  color: var(--cyan);  }
        .chip-fading   { border-color: var(--amber); color: var(--amber); }
        .chip-dormant  { border-color: var(--coral); color: var(--coral); }

        /* Forms */
        .form-card {
            border: 1px solid var(--stone);
            padding: 36px 32px;
            background: var(--soil-raised);
            box-shadow:
                0 1px 0 0 var(--loam) inset,
                0 -40px 60px -40px rgba(201, 168, 255, 0.06) inset;
        }
        .form-header {
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .form-row {
            margin-bottom: 20px;
        }
        .form-row label {
            display: block;
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--loam);
            color: var(--bone);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            padding: 8px 0;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-row input:focus,
        .form-row select:focus,
        .form-row textarea:focus {
            border-bottom-color: var(--mint);
            box-shadow: 0 1px 0 0 var(--mint), 0 2px 12px -4px rgba(127, 255, 176, 0.5);
        }
        .form-row textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-row .slider-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .form-row input[type="range"] {
            flex: 1;
            border: none;
            padding: 0;
            accent-color: var(--mint);
        }
        .form-row .slider-value {
            font-family: var(--font-mono);
            color: var(--mint);
            min-width: 24px;
            text-align: right;
        }

        .form-error {
            color: var(--coral);
            font-size: var(--text-xs);
            margin: 12px 0;
            min-height: 16px;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            background: transparent;
            border: 1px solid var(--bone);
            color: var(--bone);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.1s;
        }
        .btn:hover { background: var(--bone); color: var(--soil); }
        .btn:active { transform: scale(0.98); }
        .btn-accent {
            border-color: var(--mint);
            color: var(--mint);
            box-shadow: 0 0 0 0 rgba(127, 255, 176, 0), inset 0 0 0 0 rgba(127, 255, 176, 0);
            transition: background 0.25s, color 0.25s, transform 0.1s, box-shadow 0.3s, text-shadow 0.3s;
            text-shadow: 0 0 10px rgba(127, 255, 176, 0.3);
        }
        .btn-accent:hover {
            background: var(--mint);
            color: var(--soil);
            box-shadow: 0 0 18px rgba(127, 255, 176, 0.5), 0 0 36px rgba(127, 255, 176, 0.25);
            text-shadow: none;
        }
        .btn-danger { border-color: var(--coral); color: var(--coral); }
        .btn-danger:hover { background: var(--coral); color: var(--soil); }
        .btn-block { display: block; width: 100%; text-align: center; }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .form-actions .btn { flex: 1; }

        /* Stat cards (used in Joy/Cost report) */
        .stat-row {
            display: flex;
            gap: 56px;
            padding: 32px 0;
            border-bottom: 1px solid var(--loam);
            margin-bottom: 32px;
        }
        .stat-block .stat-label {
            font-size: var(--text-xs);
            color: var(--ash);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .stat-block .stat-value {
            font-family: var(--font-serif);
            font-size: var(--text-3xl);
            color: var(--bone);
            line-height: 1.1;
            margin: 8px 0 4px;
        }
        .stat-block .stat-value.mint  { color: var(--mint);  }
        .stat-block .stat-value.lilac { color: var(--lilac); }
        .stat-block .stat-value.amber { color: var(--amber); }
        .stat-block .stat-value.coral { color: var(--coral); }
        .stat-block .stat-sub {
            font-size: 11px;
            color: var(--dust);
        }

        /* Empty state */
        .empty {
            color: var(--dust);
            font-size: var(--text-sm);
            padding: 48px 0;
            text-align: center;
            font-style: italic;
        }

        /* Vault scan box */
        .scan-card {
            border: 1px solid var(--loam);
            padding: 40px;
            margin-bottom: 32px;
            background: var(--soil);
        }
        .scan-result {
            margin-top: 24px;
            padding: 16px;
            background: var(--soil-raised);
            border-left: 2px solid var(--mint);
            color: var(--bone);
            font-size: var(--text-sm);
        }
        .scan-result.error {
            border-left-color: var(--coral);
        }

        /* Phase 4 — Context Export page */
        .context-intro {
            padding: 20px 24px;
            background: var(--soil-raised);
            border: 1px solid var(--loam);
            border-left: 2px solid var(--mint);
            margin-bottom: 28px;
            max-width: 820px;
        }
        .context-intro p {
            margin: 0 0 10px 0;
            font-size: var(--text-sm);
            line-height: 1.6;
            color: var(--bone);
        }
        .context-intro p:last-child { margin-bottom: 0; }
        .context-intro strong { color: var(--mint); font-weight: 500; }
        .context-privacy {
            font-size: var(--text-xs) !important;
            color: var(--dust) !important;
            font-style: italic;
        }
        .context-actions {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .context-stats {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--dust);
            letter-spacing: 0.08em;
        }
        .context-stats .stat-num {
            color: var(--mint);
            font-weight: 500;
        }
        .context-preview-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--ash);
            letter-spacing: 0.25em;
            margin-bottom: 8px;
        }
        .context-preview {
            background: var(--soil-raised);
            border: 1px solid var(--loam);
            padding: 24px 28px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.7;
            color: var(--bone);
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 620px;
            overflow-y: auto;
            margin: 0;
        }
        .copy-success {
            background: var(--mint) !important;
            color: var(--soil) !important;
            border-color: var(--mint) !important;
        }

        /* Phase 3 — Subscription ↔ Skill linking UI */
        .form-section-sep {
            height: 1px;
            background: var(--loam);
            margin: 28px 0 20px;
        }
        .sub-skills-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 32px;
            padding: 6px 0;
        }
        .linked-skill-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 6px 5px 12px;
            font-family: var(--font-mono);
            font-size: 11px;
            background: var(--soil-raised);
            border: 1px solid var(--mint);
            color: var(--mint);
            letter-spacing: 0.05em;
        }
        .linked-skill-chip button {
            background: transparent;
            border: none;
            color: var(--mint);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0 6px;
            opacity: 0.6;
            transition: opacity 0.15s;
        }
        .linked-skill-chip button:hover {
            opacity: 1;
        }
        .sub-skills-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .sub-skills-suggestions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .suggestion-hint {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--ash);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin: 4px 0 2px;
        }
        .suggestion-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--loam);
            color: var(--bone);
            font-family: var(--font-mono);
            font-size: 12px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            text-align: left;
        }
        .suggestion-chip:hover {
            border-color: var(--mint);
            background: var(--soil-raised);
        }
        .suggestion-name {
            font-family: var(--font-serif);
            font-size: 14px;
            color: var(--bone);
            min-width: 140px;
        }
        .suggestion-score {
            font-size: 10px;
            color: var(--mint);
            letter-spacing: 0.08em;
        }
        .suggestion-tokens {
            font-size: 10px;
            color: var(--dust);
            margin-left: auto;
        }
        .empty-inline {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--ash);
            font-style: italic;
        }

        /* Skills page — toolbar + card grid */
        .skills-toolbar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--loam);
        }
        .skills-hint {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            color: var(--dust);
            letter-spacing: 0.05em;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .skill-card {
            position: relative;
            border: 1px solid var(--loam);
            background: var(--soil-raised);
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }
        .skill-card:hover {
            border-color: var(--stone);
            transform: translateY(-1px);
        }
        .skill-confidence-band {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            transition: width 0.4s ease-out;
        }
        .band-mint   { background: var(--mint);  box-shadow: 0 0 8px var(--mint); }
        .band-cyan   { background: var(--cyan);  box-shadow: 0 0 8px var(--cyan); }
        .band-amber  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
        .band-dust   { background: var(--dust); }
        .skill-card-inner {
            padding: 20px 22px 22px;
            position: relative;
        }
        .skill-edit-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 26px;
            height: 26px;
            padding: 0;
            border: 1px solid transparent;
            background: transparent;
            color: var(--ash);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .skill-card:hover .skill-edit-btn {
            opacity: 1;
        }
        .skill-edit-btn:hover {
            color: var(--mint);
            border-color: var(--loam);
        }
        .skill-rename-form {
            display: none;
            gap: 6px;
            align-items: center;
            margin-bottom: 10px;
        }
        .skill-rename-form input {
            flex: 1;
            padding: 6px 10px;
            font-family: var(--font-serif);
            font-size: 18px;
            background: var(--soil);
            border: 1px solid var(--stone);
            color: var(--bone);
            outline: none;
        }
        .skill-rename-form input:focus {
            border-color: var(--mint);
        }
        .btn-mini {
            padding: 5px 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            background: transparent;
            border: 1px solid var(--loam);
            color: var(--dust);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-mini:hover {
            border-color: var(--stone);
            color: var(--bone);
        }
        .btn-mini.btn-accent {
            border-color: var(--mint);
            color: var(--mint);
        }
        .skill-name {
            font-family: var(--font-serif);
            font-size: 22px;
            color: var(--bone);
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }
        .skill-meta {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--ash);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        .skill-tokens {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .skill-token {
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 3px 10px;
            background: var(--soil);
            color: var(--dust);
            border: 1px solid var(--loam);
            border-radius: 2px;
            letter-spacing: 0.03em;
        }

        /* Bidirectional sync — action row + live watch indicator */
        .vault-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .vault-sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0 4px;
            font-size: var(--text-xs);
            color: var(--dust);
            line-height: 1.6;
        }
        .watch-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--mint);
            box-shadow: 0 0 10px var(--mint);
            animation: watch-pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        .watch-dot-off {
            background: var(--stone);
            box-shadow: none;
            animation: none;
        }
        @keyframes watch-pulse {
            0%, 100% { opacity: 1;   transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.85); }
        }

        /* Vault page sections — Export / Import / Scan */
        .vault-section {
            border: 1px solid var(--stone);
            padding: 36px 40px;
            margin-bottom: 28px;
            background: var(--soil-raised);
            box-shadow: 0 -40px 60px -40px rgba(201, 168, 255, 0.06) inset;
        }
        .vault-section-title {
            font-size: 10px;
            color: var(--ash);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .vault-section-body {
            color: var(--dust);
            font-size: var(--text-sm);
            line-height: 1.7;
            margin-bottom: 24px;
            max-width: 640px;
        }
        .vault-mode-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .vault-mode {
            flex: 1;
            min-width: 180px;
            display: block;
            padding: 16px 20px;
            border: 1px solid var(--loam);
            background: var(--soil);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .vault-mode:has(input:checked) {
            border-color: var(--mint);
            background: rgba(127, 255, 176, 0.04);
            box-shadow: 0 0 0 1px var(--mint), 0 0 24px -8px rgba(127, 255, 176, 0.4);
        }
        .vault-mode input {
            display: none;
        }
        .vault-mode-name {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--bone);
            letter-spacing: 0.18em;
            margin-bottom: 4px;
        }
        .vault-mode:has(input:checked) .vault-mode-name {
            color: var(--mint);
        }
        .vault-mode-desc {
            display: block;
            font-size: 10px;
            color: var(--dust);
            line-height: 1.5;
        }

        /* Cognitive map SVG */
        .heatmap-wrap {
            border: 1px solid var(--loam);
            background: var(--soil);
            padding: 24px;
        }
        .heatmap-wrap svg {
            width: 100%;
            height: 600px;
            display: block;
        }
        .heatmap-edge {
            fill: none;
            stroke: var(--lilac);
            stroke-opacity: 0.4;
            transition: stroke-opacity 0.3s;
        }
        .heatmap-edge:hover { stroke-opacity: 1; stroke-width: 2; }
        .heatmap-node {
            cursor: pointer;
            transition: r 0.3s, filter 0.3s;
        }
        .heatmap-node:hover { filter: brightness(1.5); }
        .heatmap-label {
            fill: var(--bone);
            font-size: 10px;
            font-family: var(--font-mono);
            pointer-events: none;
        }

        /* ============================================================
           Tree view — Yggdrasil
           ============================================================ */

        .tree-page {
            padding: 0;
            margin: 0;
            position: relative;
        }
        .tree-header {
            position: sticky;
            top: 0;
            z-index: 5;
            background: linear-gradient(to bottom, var(--soil) 60%, transparent 100%);
            padding: 32px 64px 48px 64px;
            pointer-events: none;
        }
        .tree-header .page-title { pointer-events: auto; }
        .tree-svg-wrap {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 32px 80px 32px;
        }
        .tree-svg {
            width: 100%;
            max-width: 1200px;
            height: auto;
            display: block;
            user-select: none;
        }

        /* Trunk + branches in their default (resting) state.
           Baseline neon: branches glow softly even when nothing is selected. */
        .tree-trunk {
            fill: none;
            stroke: var(--bone);
            stroke-width: 3.2;
            stroke-linecap: round;
            opacity: 0.88;
            filter:
                drop-shadow(0 0 8px rgba(232, 230, 225, 0.4))
                drop-shadow(0 0 20px rgba(201, 168, 255, 0.28))
                drop-shadow(0 0 40px rgba(159, 232, 255, 0.15));
        }
        .tree-branch {
            fill: none;
            stroke: var(--ash);
            stroke-width: 1.4;
            stroke-linecap: round;
            opacity: 0.9;
            filter:
                drop-shadow(0 0 5px rgba(201, 168, 255, 0.5))
                drop-shadow(0 0 12px rgba(127, 255, 176, 0.22));
            transition:
                stroke 0.35s ease,
                stroke-width 0.35s ease,
                opacity 0.35s ease,
                filter 0.35s ease;
            cursor: pointer;
        }
        .tree-branch.hover {
            stroke: var(--bone);
            stroke-width: 2.2;
            opacity: 1;
            filter:
                drop-shadow(0 0 8px var(--lilac))
                drop-shadow(0 0 18px rgba(127, 255, 176, 0.5))
                drop-shadow(0 0 28px rgba(159, 232, 255, 0.3));
        }
        .tree-branch.active {
            stroke: url(#aurora-gradient);
            stroke-width: 2.8;
            opacity: 1;
            filter:
                drop-shadow(0 0 10px var(--mint))
                drop-shadow(0 0 22px var(--cyan))
                drop-shadow(0 0 38px var(--lilac));
            stroke-dasharray: 6 4;
            animation: aurora-flow 2.2s linear infinite;
        }
        @keyframes aurora-flow {
            from { stroke-dashoffset: 0;  }
            to   { stroke-dashoffset: -40; }
        }
        .tree-branch.sympathetic {
            stroke: var(--lilac);
            stroke-width: 2;
            opacity: 0.85;
            filter:
                drop-shadow(0 0 6px var(--lilac))
                drop-shadow(0 0 14px rgba(201, 168, 255, 0.5));
        }

        /* Sympathetic arc connecting linked nodes through the canopy */
        .tree-link-arc {
            fill: none;
            stroke: url(#aurora-gradient);
            stroke-width: 1.6;
            stroke-dasharray: 4 6;
            opacity: 0;
            filter: drop-shadow(0 0 6px var(--lilac)) drop-shadow(0 0 14px rgba(201, 168, 255, 0.4));
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .tree-link-arc.visible {
            opacity: 0.9;
            animation: arc-flow 2.5s linear infinite;
        }
        @keyframes arc-flow {
            from { stroke-dashoffset: 0;   }
            to   { stroke-dashoffset: -40; }
        }

        /* ============================================================
           Crystalline shards — the leaves/roots of the tree.
           Each shard is a kite-shaped SVG path, tilted outward along
           its branch, with a thin internal facet line catching light.
           ============================================================ */

        /* Invisible hit area — gives small shards a comfortable click target */
        .tree-node-hit {
            fill: transparent;
            cursor: pointer;
        }

        /* Per-type baseline glow at rest */
        .tree-node-shard {
            stroke-linejoin: miter;
            stroke-width: 1.4;
            transition: stroke 0.3s, stroke-width 0.3s, fill 0.3s, filter 0.4s;
            pointer-events: none;
        }
        .tree-node-group.sub .tree-node-shard {
            stroke: var(--mint);
            fill: rgba(127, 255, 176, 0.24);
            filter:
                drop-shadow(0 0 5px rgba(127, 255, 176, 0.85))
                drop-shadow(0 0 14px rgba(127, 255, 176, 0.45))
                drop-shadow(0 0 28px rgba(127, 255, 176, 0.2));
        }
        .tree-node-group.repo .tree-node-shard {
            stroke: var(--cyan);
            fill: rgba(159, 232, 255, 0.24);
            filter:
                drop-shadow(0 0 5px rgba(159, 232, 255, 0.85))
                drop-shadow(0 0 14px rgba(159, 232, 255, 0.45))
                drop-shadow(0 0 28px rgba(159, 232, 255, 0.2));
        }
        .tree-node-group.idea .tree-node-shard {
            stroke: var(--amber);
            fill: rgba(255, 214, 107, 0.24);
            filter:
                drop-shadow(0 0 5px rgba(255, 214, 107, 0.85))
                drop-shadow(0 0 14px rgba(255, 214, 107, 0.45))
                drop-shadow(0 0 28px rgba(255, 214, 107, 0.2));
        }

        /* Facet — thin inner line, light catching one face */
        .tree-node-facet {
            fill: none;
            stroke: rgba(255, 255, 255, 0.55);
            stroke-width: 0.8;
            stroke-linecap: round;
            pointer-events: none;
            transition: stroke 0.3s, stroke-width 0.3s;
        }
        .tree-node-group.sub .tree-node-facet   { stroke: rgba(232, 255, 240, 0.65); }
        .tree-node-group.repo .tree-node-facet  { stroke: rgba(232, 247, 255, 0.65); }
        .tree-node-group.idea .tree-node-facet  { stroke: rgba(255, 248, 224, 0.65); }

        /* Hover / preview — shard brightens, facet sharpens */
        .tree-node-group:hover .tree-node-shard,
        .tree-node-group.preview .tree-node-shard {
            stroke-width: 2;
        }
        .tree-node-group:hover .tree-node-facet,
        .tree-node-group.preview .tree-node-facet {
            stroke: rgba(255, 255, 255, 0.9);
            stroke-width: 1.1;
        }
        .tree-node-group.sub:hover .tree-node-shard,
        .tree-node-group.sub.preview .tree-node-shard {
            fill: rgba(127, 255, 176, 0.38);
            filter:
                drop-shadow(0 0 8px var(--mint))
                drop-shadow(0 0 20px rgba(127, 255, 176, 0.75))
                drop-shadow(0 0 38px rgba(127, 255, 176, 0.35));
        }
        .tree-node-group.repo:hover .tree-node-shard,
        .tree-node-group.repo.preview .tree-node-shard {
            fill: rgba(159, 232, 255, 0.38);
            filter:
                drop-shadow(0 0 8px var(--cyan))
                drop-shadow(0 0 20px rgba(159, 232, 255, 0.75))
                drop-shadow(0 0 38px rgba(159, 232, 255, 0.35));
        }
        .tree-node-group.idea:hover .tree-node-shard,
        .tree-node-group.idea.preview .tree-node-shard {
            fill: rgba(255, 214, 107, 0.38);
            filter:
                drop-shadow(0 0 8px var(--amber))
                drop-shadow(0 0 20px rgba(255, 214, 107, 0.75))
                drop-shadow(0 0 38px rgba(255, 214, 107, 0.35));
        }

        /* Click — full neon ignition, shard hums */
        .tree-node-group.active .tree-node-shard {
            stroke-width: 2.4;
        }
        .tree-node-group.active .tree-node-facet {
            stroke: rgba(255, 255, 255, 1);
            stroke-width: 1.4;
        }
        .tree-node-group.sub.active .tree-node-shard {
            fill: rgba(127, 255, 176, 0.5);
            filter:
                drop-shadow(0 0 10px var(--mint))
                drop-shadow(0 0 24px var(--mint))
                drop-shadow(0 0 44px rgba(127, 255, 176, 0.6));
        }
        .tree-node-group.repo.active .tree-node-shard {
            fill: rgba(159, 232, 255, 0.5);
            filter:
                drop-shadow(0 0 10px var(--cyan))
                drop-shadow(0 0 24px var(--cyan))
                drop-shadow(0 0 44px rgba(159, 232, 255, 0.6));
        }
        .tree-node-group.idea.active .tree-node-shard {
            fill: rgba(255, 214, 107, 0.5);
            filter:
                drop-shadow(0 0 10px var(--amber))
                drop-shadow(0 0 24px var(--amber))
                drop-shadow(0 0 44px rgba(255, 214, 107, 0.6));
        }

        /* Sympathetic — the lilac-tinted resonance from a semantic neighbour */
        .tree-node-group.sympathetic .tree-node-shard {
            stroke: var(--lilac);
            stroke-width: 1.8;
            fill: rgba(201, 168, 255, 0.22);
            filter:
                drop-shadow(0 0 6px var(--lilac))
                drop-shadow(0 0 16px rgba(201, 168, 255, 0.55))
                drop-shadow(0 0 32px rgba(201, 168, 255, 0.25));
        }
        .tree-node-group.sympathetic .tree-node-facet {
            stroke: rgba(232, 220, 255, 0.9);
            stroke-width: 1;
        }

        .tree-node-label {
            fill: var(--dust);
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.04em;
            text-anchor: middle;
            pointer-events: none;
            transition: fill 0.3s;
        }

        /* ============================================================
           Field view — shard specimens in a gallery grid.
           Same crystalline vocabulary as the tree, just larger and
           tilted randomly so they don't read as uniform.
           ============================================================ */
        .field-shard svg {
            overflow: visible;
        }
        .field-shard .field-shard-body {
            stroke-width: 1.6;
            stroke-linejoin: miter;
            transition: stroke 0.3s, fill 0.3s, filter 0.4s;
        }
        .field-shard.sub .field-shard-body {
            stroke: var(--mint);
            fill: rgba(127, 255, 176, 0.28);
            filter:
                drop-shadow(0 0 8px rgba(127, 255, 176, 0.8))
                drop-shadow(0 0 22px rgba(127, 255, 176, 0.45))
                drop-shadow(0 0 44px rgba(127, 255, 176, 0.22));
        }
        .field-shard.repo .field-shard-body {
            stroke: var(--cyan);
            fill: rgba(159, 232, 255, 0.28);
            filter:
                drop-shadow(0 0 8px rgba(159, 232, 255, 0.8))
                drop-shadow(0 0 22px rgba(159, 232, 255, 0.45))
                drop-shadow(0 0 44px rgba(159, 232, 255, 0.22));
        }
        .field-shard.idea .field-shard-body {
            stroke: var(--amber);
            fill: rgba(255, 214, 107, 0.28);
            filter:
                drop-shadow(0 0 8px rgba(255, 214, 107, 0.8))
                drop-shadow(0 0 22px rgba(255, 214, 107, 0.45))
                drop-shadow(0 0 44px rgba(255, 214, 107, 0.22));
        }
        .field-shard .field-shard-facet-a,
        .field-shard .field-shard-facet-b {
            fill: none;
            stroke-width: 1.1;
            stroke-linecap: round;
            transition: stroke 0.3s, stroke-width 0.3s;
        }
        .field-shard .field-shard-facet-a {
            stroke: rgba(255, 255, 255, 0.85);
        }
        .field-shard .field-shard-facet-b {
            stroke: rgba(255, 255, 255, 0.35);
        }
        .field-shard:hover .field-shard-body {
            stroke-width: 2.2;
        }
        .field-shard.sub:hover .field-shard-body {
            fill: rgba(127, 255, 176, 0.5);
            filter:
                drop-shadow(0 0 12px var(--mint))
                drop-shadow(0 0 28px var(--mint))
                drop-shadow(0 0 56px rgba(127, 255, 176, 0.5));
        }
        .field-shard.repo:hover .field-shard-body {
            fill: rgba(159, 232, 255, 0.5);
            filter:
                drop-shadow(0 0 12px var(--cyan))
                drop-shadow(0 0 28px var(--cyan))
                drop-shadow(0 0 56px rgba(159, 232, 255, 0.5));
        }
        .field-shard.idea:hover .field-shard-body {
            fill: rgba(255, 214, 107, 0.5);
            filter:
                drop-shadow(0 0 12px var(--amber))
                drop-shadow(0 0 28px var(--amber))
                drop-shadow(0 0 56px rgba(255, 214, 107, 0.5));
        }

        .tree-trunk-label {
            fill: var(--bone);
            font-family: var(--font-serif);
            font-size: 32px;
            text-anchor: middle;
            pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(232, 230, 225, 0.4));
        }
        .tree-trunk-sublabel {
            fill: var(--ash);
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.22em;
            text-anchor: middle;
            text-transform: uppercase;
            pointer-events: none;
        }
        .tree-trunk-stat {
            fill: var(--ash);
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            pointer-events: none;
        }
        .tree-trunk-stat-value {
            fill: var(--bone);
            font-family: var(--font-serif);
            font-size: 20px;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(232, 230, 225, 0.35));
        }

        /* Soil divider line — barely visible */
        .tree-soil {
            stroke: var(--loam);
            stroke-width: 1;
            stroke-dasharray: 2 6;
            opacity: 0.6;
        }
        .tree-soil-label {
            fill: var(--dust);
            font-family: var(--font-mono);
            font-size: 8px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* ============================================================
           Inspector modal (slides in from the right as a sidebar —
           tree stays visible behind it, no full-screen blur)
           ============================================================ */
        .tree-modal-backdrop {
            display: none;
        }
        .tree-modal {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 360px;
            max-width: 90vw;
            background: rgba(5, 6, 9, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-left: 1px solid var(--stone);
            transform: translateX(100%);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 100;
            overflow-y: auto;
            padding: 48px 36px 36px 36px;
            box-shadow: -40px 0 120px rgba(0,0,0,0.6);
        }
        .tree-modal.visible {
            transform: translateX(0);
        }
        .tree-modal-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            color: var(--ash);
            font-family: var(--font-mono);
            font-size: 16px;
            cursor: pointer;
            padding: 8px 12px;
            transition: color 0.2s;
        }
        .tree-modal-close:hover { color: var(--bone); }

        .tree-modal-eyebrow {
            font-size: 9px;
            color: var(--ash);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .tree-modal-name {
            font-family: var(--font-serif);
            font-size: 36px;
            color: var(--bone);
            line-height: 1.1;
            margin-bottom: 24px;
        }
        .tree-modal-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 24px;
            margin: 24px 0 32px 0;
            padding: 20px 0;
            border-top: 1px solid var(--loam);
            border-bottom: 1px solid var(--loam);
        }
        .tree-modal-meta-label {
            font-size: 9px;
            color: var(--ash);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .tree-modal-meta-value {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--bone);
            margin-top: 4px;
        }
        .tree-modal-section-title {
            font-size: 9px;
            color: var(--ash);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 24px 0 12px 0;
        }
        .tree-modal-linked {
            font-size: var(--text-sm);
            color: var(--bone);
            line-height: 1.7;
        }
        .tree-modal-linked .linked-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--loam);

        .tree-modal-linked .linked-row:hover { color: var(--mint); }
        .tree-modal-linked .linked-strength {
            color: var(--dust);
            font-size: var(--text-xs);
        }

    </style>
</head>
<body>

            <button class="login-btn" id="login-btn">ENTER →</button>

                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>

    <!-- ==================== App Shell ==================== -->
    <div id="app-shell">

        <div class="sidebar">
            <div class="nav-header">ECOSYSTEM</div>

    <!-- ==================== JavaScript ==================== -->
    <script>
        // ============================================================
        //  State
        // ============================================================
        let token = null;
        let currentUser = null;
        let currentView = 'dashboard';

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        // ============================================================
        //  API helper
        // ============================================================
        async function api(method, path, body) {
            const opts = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (token) opts.headers['Authorization'] = 'Bearer ' + token;
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(path, opts);
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        // ============================================================
        //  Guilloché animation
        // ============================================================
        function initGuilloche() {
            const canvas = $('#guilloche');
            const ctx = canvas.getContext('2d');
            let phase = 0;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function draw() {
                const w = canvas.width, h = canvas.height;
                ctx.clearRect(0, 0, w, h);
                ctx.lineCap = 'round';
                ctx.lineWidth = 0.6;

                for (let i = 0; i < 28; i++) {
                    const t = i / 28;
                    const opacity = 0.04 + 0.04 * Math.sin(t * Math.PI);
                    ctx.strokeStyle = `rgba(232, 230, 225, ${opacity})`;

                    const freq = 0.012 + 0.004 * Math.sin(t * Math.PI * 2 + phase);
                    const amplitude = 80 + 40 * Math.sin(t * Math.PI + phase * 0.5);
                    const yBase = h * t;

                    ctx.beginPath();
                    for (let x = 0; x <= w; x += 6) {
                        const y = yBase + Math.sin(x * freq + phase + i * 0.3) * amplitude;
                        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }

                phase += 0.003;
                requestAnimationFrame(draw);
            }
            draw();
        }

        // ============================================================
        //  Login + signup
        // ============================================================
        let loginMode = 'signin';  // 'signin' | 'signup'

        function setLoginMode(mode) {
            loginMode = mode;
            const confirmGroup = $('#confirm-group');
            const btn          = $('#login-btn');
            const toggle       = $('#login-mode-toggle');
            const tagline      = $('#login-tagline');
            const hintSeed     = $('#login-hint-seed');
            $('#login-error').textContent = '';

            if (mode === 'signup') {
                confirmGroup.style.display = '';
                btn.innerHTML = 'CREATE ACCOUNT →';
                toggle.innerHTML = '← back to sign in';
                tagline.textContent = "every tree starts with a seed";
                if (hintSeed) hintSeed.style.display = 'none';
            } else {
                confirmGroup.style.display = 'none';
                btn.innerHTML = 'ENTER →';
                toggle.innerHTML = 'create new account →';
                tagline.textContent = "a local-first life management grounder";
                if (hintSeed) hintSeed.style.display = '';
            }
        }

        async function attemptLogin() {
            const username = $('#login-user').value.trim();
            const password = $('#login-pass').value;
            $('#login-error').textContent = '';

            if (!username || !password) {
                $('#login-error').textContent = 'both fields are required';
                return;
            }

            if (loginMode === 'signup') {
                const confirm = $('#login-confirm').value;
                if (password !== confirm) {
                    $('#login-error').textContent = 'passwords do not match';
                    return;
                }
                if (password.length < 6) {
                    $('#login-error').textContent = 'password must be at least 6 characters';
                    return;
                }
                const signup = await api('POST', '/api/signup', { username, password });
                if (!signup || signup.error) {
                    $('#login-error').textContent = signup?.error || 'signup failed';
                    return;
                }
                // Server auto-logs us in and returns a token on 201
                token = signup.token;
                currentUser = signup;
                enterApp();
                return;
            }

            const data = await api('POST', '/api/login', { username, password });
            if (!data || data.error) {
                $('#login-error').textContent = data?.error || 'connection failed';
                return;
            }

            token = data.token;
            currentUser = data;
            enterApp();
        }

        function enterApp() {
            $('#topbar-user').textContent = `@${currentUser.username} · ${currentUser.role}`;
            $('#login-screen').classList.add('hidden');
            const shell = $('#app-shell');
            shell.classList.add('visible');
            // Trigger opacity transition on next frame
            requestAnimationFrame(() => { shell.style.opacity = '1'; });
            navigate('tree');
        }

        function logout() {
            api('POST', '/api/logout');
            token = null;
            currentUser = null;
            $('#login-screen').classList.remove('hidden');
            $('#app-shell').classList.remove('visible');
            $('#app-shell').style.opacity = '0';
            $('#login-user').value = '';
            $('#login-pass').value = '';
            $('#login-error').textContent = '';
        }

        // ============================================================
        //  Navigation
        // ============================================================
        function navigate(view) {
            currentView = view;
            $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));
            loadView(view);
        }

        async function loadView(view) {
            const content = $('#content');
            content.innerHTML = '<div class="content-loading">loading…</div>';

            switch (view) {
                case 'tree':      return renderTree(content);
                case 'dashboard': return renderDashboard(content);
                case 'heatmap':   return renderHeatmap(content);
                case 'subs':      return renderSubsView(content);
                case 'repos':     return renderReposView(content);
                case 'ideas':     return renderIdeasView(content);
                case 'skills':    return renderSkills(content);
                case 'joycost':   return renderJoyCost(content);
                case 'context':   return renderContext(content);
                case 'vault':     return renderVault(content);
                case 'audit':     return renderAudit(content);
            }
        }

        function renderPlaceholder(el, text) {
            el.innerHTML = `<div class="content-loading">${text}</div>`;
        }

        // ============================================================
        //  Dashboard
        // ============================================================
        async function renderDashboard(el) {
            const data = await api('GET', '/api/dashboard');
            if (!data) return;

            el.innerHTML = `
                <div style="margin-bottom: 48px;">
                    <div style="font-family: var(--font-serif); font-size: var(--text-4xl); color: var(--bone); line-height: 1.1;">
                        Your ecosystem
                    </div>
                    <div style="color: var(--ash); font-style: italic; margin-top: 8px; font-size: var(--text-sm);">
                        a living read on what's growing, what's draining, what's been forgotten
                    </div>
                </div>

                <div style="display: flex; gap: 56px; margin-bottom: 56px; padding-bottom: 32px; border-bottom: 1px solid var(--loam);">
                    ${statBlock('ECOSYSTEM VITALITY', data.avgVitality.toFixed(2), bandLabel(data.avgVitality), 'var(--bone)')}
                    ${statBlock('MONTHLY BURN', '₹' + data.monthlyBurn.toLocaleString(), data.subCount + ' subscriptions', 'var(--mint)')}
                    ${statBlock('LIVING NODES', data.totalNodes, data.subCount + ' sub · ' + data.repoCount + ' repo · ' + data.ideaCount + ' idea', 'var(--lilac)')}
                </div>

                <div style="font-size: var(--text-xs); color: var(--ash); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px;">
                    THE FIELD
                </div>
                <div style="font-size: 11px; color: var(--dust); margin-bottom: 24px;">
                    size = vitality · colour = type · dim = forgotten
                </div>
                <div id="ecosystem-field" style="display: flex; flex-wrap: wrap; gap: 28px;"></div>
            `;

            // Render glowing nodes
            const field = document.getElementById('ecosystem-field');
            for (const node of data.nodes) {
                field.appendChild(createNodeGlyph(node));
            }
        }

        function statBlock(label, value, sub, color) {
            return `
                <div>
                    <div style="font-size: var(--text-xs); color: var(--ash); letter-spacing: 0.2em; text-transform: uppercase;">${label}</div>
                    <div style="font-family: var(--font-serif); font-size: var(--text-4xl); color: ${color}; line-height: 1.1; margin: 8px 0 4px;">${value}</div>
                    <div style="font-size: 11px; color: var(--dust);">${sub}</div>
                </div>
            `;
        }

        function bandLabel(v) {
            if (v >= 0.75) return 'thriving';
            if (v >= 0.50) return 'steady';
            if (v >= 0.25) return 'fading';
            return 'dormant';
        }

        function createNodeGlyph(node) {
            const v = node.vitality;
            const accent = node.accent;

            // Shard geometry — matches the tree's vocabulary but larger so
            // the Field reads as a gallery of specimens, not a tree in miniature.
            const vLen = 36 + 68 * v;
            const vWid = 22 + 42 * v;
            const box  = Math.ceil(vLen * 2 + 80);  // room for the glow halo

            const cx = box / 2, cy = box / 2;
            const topX    = cx,               topY    = cy + vLen;
            const rightX  = cx + vWid * 0.55, rightY  = cy + vLen * 0.15;
            const botX    = cx,               botY    = cy - vLen * 0.6;
            const leftX   = cx - vWid * 0.55, leftY   = cy + vLen * 0.15;
            const shardD  = `M ${topX} ${topY} L ${rightX} ${rightY} L ${botX} ${botY} L ${leftX} ${leftY} Z`;
            const facetD  = `M ${topX} ${topY} L ${leftX} ${leftY}`;
            const facet2D = `M ${topX} ${topY} L ${rightX} ${rightY}`;

            // Random tilt so the Field doesn\'t read as a grid of identical gems
            const tilt = (Math.random() * 30 - 15).toFixed(1);
            const typeClass = node.type.toLowerCase();
            const delay = (Math.random() * 2.4).toFixed(2);

            const wrapper = document.createElement('div');
            wrapper.className = 'field-glyph-wrap';
            wrapper.style.cssText = `
                display: flex; flex-direction: column; align-items: center;
                width: 160px; cursor: default;
            `;

            const svgBox = document.createElement('div');
            svgBox.className = `field-shard ${typeClass}`;
            svgBox.style.cssText = `
                width: ${box}px; height: ${box}px;
                display: flex; align-items: center; justify-content: center;
                animation: pulse ${(3.6).toFixed(1)}s cubic-bezier(0.45, 0, 0.55, 1) ${delay}s infinite;
            `;
            svgBox.innerHTML = `
                <svg width="${box}" height="${box}" viewBox="0 0 ${box} ${box}" xmlns="http://www.w3.org/2000/svg">
                    <g transform="rotate(${tilt} ${cx} ${cy})">
                        <path class="field-shard-body" d="${shardD}"/>
                        <path class="field-shard-facet-a" d="${facetD}"/>
                        <path class="field-shard-facet-b" d="${facet2D}"/>
                    </g>
                </svg>
            `;

            const label = document.createElement('div');
            label.textContent = node.name.length > 18 ? node.name.substring(0, 17) + '…' : node.name;
            label.style.cssText = `font-size: 10px; color: var(--bone); margin-top: 8px; text-align: center;`;

            const band = document.createElement('div');
            band.textContent = node.type + ' · ' + node.band;

        function injectGmailScanButton() {
            // The CRUD widget doesn't know about Gmail. We look for the
            // crud-toolbar that paintCrudView rendered and append our
            // own button next to the existing "NEW +" action.
            const toolbar = document.querySelector('.crud-toolbar');
            if (!toolbar) return;
            // Don't add it twice if the page re-renders
            if (toolbar.querySelector('.gmail-scan-btn')) return;
            const btn = document.createElement('button');
            btn.className = 'btn gmail-scan-btn';
            btn.innerHTML = `
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                <span>SCAN GMAIL</span>
            `;
            btn.onclick = scanGmailForSubs;
            toolbar.appendChild(btn);
        }

        async function scanGmailForSubs() {
            // Show the modal with a loading state, then fire the scan
            openGmailScanModal();
            const body = $('#gmail-scan-body');
            body.innerHTML = '<div class="gmail-scan-loading">Scanning your inbox for Stripe receipts…<br><span class="gmail-scan-sub">this can take 10-20 seconds</span></div>';

            const result = await api('POST', '/api/gmail/scan');
            if (!result || result.error) {
                body.innerHTML = `
                    <div class="gmail-scan-error">
                        <strong>Scan failed.</strong><br>
                        ${esc(result?.error || 'Unknown error')}
                        ${result?.hint ? '<div class="gmail-scan-hint">' + esc(result.hint) + '</div>' : ''}
                    </div>`;
                return;
            }
            renderGmailScanResults(result);
        }

        function renderGmailScanResults(result) {
            const body = $('#gmail-scan-body');
            if (!result.candidates || result.candidates.length === 0) {
                body.innerHTML = `
                    <div class="gmail-scan-empty">
                        <strong>No Stripe receipts found in the last 6 months.</strong>
                        <div class="gmail-scan-hint">Roots searches for emails from <code>receipts@stripe.com</code>. If you're paying through Stripe, those emails should appear in your inbox.</div>
                    </div>`;
                return;
            }
            const rows = result.candidates.map((c, idx) => {
                const dateStr = new Date(c.receiptDateMillis).toLocaleDateString(undefined, {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
                const existsTag = c.alreadyExists
                    ? '<span class="gmail-tag gmail-tag-existing">already in Roots</span>'
                    : '<span class="gmail-tag gmail-tag-new">new</span>';
                const checked = c.alreadyExists ? '' : 'checked';
                return `
                    <label class="gmail-candidate-row ${c.alreadyExists ? 'existing' : ''}">
                        <input type="checkbox" data-candidate-idx="${idx}" ${checked}>
                        <div class="gmail-candidate-main">
                            <div class="gmail-candidate-name">${esc(c.name)} ${existsTag}</div>
                            <div class="gmail-candidate-meta">${esc(c.currency)} ${c.monthlyCost.toFixed(2)} · ${c.cadence.toLowerCase()} · last charged ${dateStr}</div>
                        </div>
                    </label>`;
            }).join('');

            // Stash candidates in a window global so the import handler can read them
            window.__gmailCandidates = result.candidates;

            body.innerHTML = `
                <div class="gmail-scan-summary">
                    Found <strong>${result.uniqueBusinesses}</strong> unique businesses across <strong>${result.messagesFound}</strong> Stripe receipts.
                    ${result.parseFailures > 0 ? `<span class="gmail-scan-warn">(${result.parseFailures} emails couldn't be parsed)</span>` : ''}
                </div>
                <div class="gmail-candidate-list">${rows}</div>
                <div class="gmail-scan-actions">
                    <button class="btn" onclick="closeGmailScanModal()">CANCEL</button>
                    <button class="btn btn-accent" onclick="importGmailCandidates()">IMPORT SELECTED →</button>
                </div>`;
        }

        async function importGmailCandidates() {
            const checked = document.querySelectorAll('.gmail-candidate-row input:checked');
            if (checked.length === 0) {
                closeGmailScanModal();
                return;
            }
            const selected = Array.from(checked).map(cb => {
                const idx = parseInt(cb.dataset.candidateIdx, 10);
                return window.__gmailCandidates[idx];
            });

            $('#gmail-scan-body').innerHTML = '<div class="gmail-scan-loading">Importing…</div>';
            const result = await api('POST', '/api/gmail/import', { candidates: selected });
            if (!result || result.error) {
                $('#gmail-scan-body').innerHTML = `<div class="gmail-scan-error"><strong>Import failed.</strong><br>${esc(result?.error || 'Unknown error')}</div>`;
                return;
            }
            $('#gmail-scan-body').innerHTML = `
                <div class="gmail-scan-success">
                    <strong>Imported ${result.created} subscription${result.created === 1 ? '' : 's'}.</strong>
                    ${result.skipped > 0 ? `<div class="gmail-scan-hint">${result.skipped} skipped (already in Roots or empty)</div>` : ''}
                </div>
                <div class="gmail-scan-actions">
                    <button class="btn btn-accent" onclick="closeGmailScanModal(); renderSubsView($('#content'));">DONE</button>
                </div>`;
        }

        function openGmailScanModal() {
            const existing = document.getElementById('gmail-scan-modal');

            const modal = document.createElement('div');

            modal.innerHTML = `

                    </div>

        }
