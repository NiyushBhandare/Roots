        // ============================================================
        //  Shared CRUD view painter
        // ============================================================
        function paintCrudView(el, opts) {
            // Apply current search filter if any. searchTerm is stored on
            // the state object so it survives re-renders during CRUD ops.
            const q = (opts.state.searchTerm || '').toLowerCase().trim();
            const filtered = q
                ? opts.state.rows.filter(r =>
                    opts.columns.some(c => String(c.get(r)).toLowerCase().includes(q)))
                : opts.state.rows;

            const headerRow = opts.columns.map(c => `<th>${c.label}</th>`).join('');
            const bodyRows = filtered.map((r, i) => {
                const cells = opts.columns.map(c =>
                    `<td class="${c.cls || ''}">${esc(String(c.get(r)))}</td>`
                ).join('');
                const sel = opts.state.selected?.id === r.id ? 'selected' : '';
                const realIdx = opts.state.rows.indexOf(r);
                return `<tr class="${sel}" data-idx="${realIdx}">${cells}</tr>`;
            }).join('') || `<tr><td colspan="${opts.columns.length}" class="empty">${q ? 'no matches for "' + esc(q) + '"' : 'no rows yet — create one →'}</td></tr>`;

            const formHtml = opts.buildForm(opts.state.selected);
            const isEditing = !!opts.state.selected;

            const titleKey = opts.title.toLowerCase();
            const saveFn   = titleKey === 'subscriptions' ? 'saveSubForm()'
                           : titleKey === 'repositories'  ? 'saveRepoForm()'
                           : 'saveIdeaForm()';
            const deleteFn = titleKey === 'subscriptions' ? 'deleteSub()'
                           : titleKey === 'repositories'  ? 'deleteRepo()'
                           : 'deleteIdea()';
            const newFn    = titleKey === 'subscriptions' ? 'subsState.selected=null; renderSubsView($(\'#content\'))'
                           : titleKey === 'repositories'  ? 'reposState.selected=null; renderReposView($(\'#content\'))'
                           : 'ideasState.selected=null; renderIdeasView($(\'#content\'))';
            const stateVar = titleKey === 'subscriptions' ? 'subsState'
                           : titleKey === 'repositories'  ? 'reposState'
                           : 'ideasState';
            const rerenderFn = titleKey === 'subscriptions' ? 'paintCrudView($(\'#content\'), __lastCrudOpts)'
                             : 'paintCrudView($(\'#content\'), __lastCrudOpts)';
            window.__lastCrudOpts = opts;

            el.innerHTML = `
                <div class="page-header">
                    <div class="page-title">${opts.title}</div>
                    <div class="page-subtitle">${opts.subtitle}</div>
                </div>
                <div class="crud-toolbar">
                    <input class="crud-search" id="crud-search" type="text"
                           placeholder="search by name, description, or any field…"
                           value="${esc(q)}" autocomplete="off">
                    ${q ? `<span class="crud-search-count">${filtered.length} of ${opts.state.rows.length}</span>` : `<span class="crud-search-count">${opts.state.rows.length} total</span>`}
                </div>
                <div class="page-grid">
                    <div>
                        <table class="table">
                            <thead><tr>${headerRow}</tr></thead>
                            <tbody id="crud-body">${bodyRows}</tbody>
                        </table>
                    </div>
                    <div class="form-card">
                        <div class="form-header">${isEditing ? 'EDIT' : 'NEW'}</div>
                        ${formHtml}
                        <div class="form-error" id="form-error"></div>
                        <button class="btn btn-accent btn-block" onclick="${saveFn}">SAVE</button>
                        <div class="form-actions">
                            <button class="btn" onclick="${newFn}">NEW</button>
                            <button class="btn btn-danger" onclick="${deleteFn}" ${isEditing?'':'disabled style="opacity:0.4;cursor:not-allowed"'}>DELETE</button>
                        </div>
                    </div>
                </div>
            `;

            el.querySelectorAll('#crud-body tr[data-idx]').forEach(tr => {
                tr.addEventListener('click', () => {
                    const idx = parseInt(tr.dataset.idx, 10);
                    opts.onSelect(opts.state.rows[idx]);
                });
            });

            // Wire the search input — incremental filter on every keystroke
            const searchInput = $('#crud-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    opts.state.searchTerm = e.target.value;
                    paintCrudView(el, opts);
                    // Restore focus + cursor position after re-render

                        core&nbsp;=&nbsp;<span class="weight">${f.core.userRatingWeight}</span>&nbsp;×&nbsp;userRating&nbsp;+&nbsp;<span class="weight">${f.core.activityWeight}</span>&nbsp;×&nbsp;activity<br>

                    <div class="formula-hint">
                        <b>Multiplicative penalties</b> mean an abandoned sub can't be rescued by a high self-rating — its engagement penalty floors at ${f.penalties.engagementFloor}, capping the final score.

        async function copyContextPrompt() {
            const btn = $('#copy-context-btn');

                await navigator.clipboard.writeText(cachedContextPrompt);

        }

        // ============================================================
        //  Tree view — Yggdrasil
        //
        //  Procedural SVG. Trunk runs vertically through the centre.
        //  Nodes with vitality >= 0.5 bloom up into the canopy.
        //  Nodes with vitality < 0.5 sink down into the roots.
        //  Click a node to ignite aurora along the path back to the
        //  trunk; sympathetic auroras light up TF-IDF related nodes
        //  and an arc bridges the two through the canopy.
        // ============================================================

        let treeState = {
            dashboard: null,
            heatmap: null,
            byId: {},
            edgesByNode: {},
            paintedNodes: [],   // {id, type, name, x, y, anchorX, anchorY, branchPath}
            activeId: null,
        };

        async function renderTree(el) {
            // Pull both the dashboard summary (for stats) and the heatmap
            // (for the TF-IDF edges). Both endpoints already exist.
            const [dashboard, heatmap] = await Promise.all([
                api('GET', '/api/dashboard'),
                api('GET', '/api/heatmap'),
            ]);
            if (!dashboard || !heatmap) return;

            treeState.dashboard = dashboard;
            treeState.heatmap = heatmap;
            treeState.byId = Object.fromEntries(dashboard.nodes.map(n => [n.id, n]));
            treeState.edgesByNode = {};
            for (const e of heatmap.edges) {
                (treeState.edgesByNode[e.source] ||= []).push({ other: e.target, sim: e.similarity });
                (treeState.edgesByNode[e.target] ||= []).push({ other: e.source, sim: e.similarity });
            }

            // Sort nodes by vitality, descending. Highest vitality goes
            // furthest up into the canopy; lowest sinks deepest into the
            // roots. We'll split them at vitality 0.5.
            const sorted = [...dashboard.nodes].sort((a, b) => b.vitality - a.vitality);
            const canopy = sorted.filter(n => n.vitality >= 0.5);
            const roots  = sorted.filter(n => n.vitality < 0.5);

            // Pick a viewport. Wide enough to spread, tall enough to scroll.
            const W = 1200, H = 1800;
            const cx = W / 2;
            const trunkTop    = 240;
            const trunkBottom = H - 220;
            const trunkMid    = (trunkTop + trunkBottom) / 2;

            // Build the trunk path (slight S-curve, organic but readable)
            const trunkPath =
                `M ${cx} ${trunkTop} ` +
                `C ${cx - 18} ${trunkTop + 200}, ${cx + 22} ${trunkBottom - 280}, ${cx} ${trunkBottom}`;

            // Lay out canopy nodes — alternate left/right, climb upward
            const canopyPositions = layoutHalf({
                nodes: canopy,
                cx, anchorY: trunkMid - 40,
                tipYStart: trunkMid - 80,
                tipYEnd:   trunkTop + 60,
                spread:    520,
                upward:    true,
            });

            // Lay out roots — alternate left/right, descend
            const rootPositions = layoutHalf({
                nodes: roots,
                cx, anchorY: trunkMid + 40,
                tipYStart: trunkMid + 80,
                tipYEnd:   trunkBottom - 60,
                spread:    540,
                upward:    false,
            });

            const allPositions = [...canopyPositions, ...rootPositions];
            treeState.paintedNodes = allPositions;

            // ----- SVG construction -----
            const branchSvg = allPositions.map((p, i) => {
                const c1x = p.anchorX + (p.x - p.anchorX) * 0.25 + (p.left ? -40 : 40);
                const c1y = p.anchorY + (p.y - p.anchorY) * 0.55;
                const c2x = p.anchorX + (p.x - p.anchorX) * 0.75 + (p.left ? -10 : 10);
                const c2y = p.anchorY + (p.y - p.anchorY) * 0.95;
                const d = `M ${p.anchorX} ${p.anchorY} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p.x} ${p.y}`;
                p.branchPath = d;
                return `<path id="branch-${p.id}" class="tree-branch" d="${d}" />`;
            }).join('');

            const nodeSvg = allPositions.map(p => {
                // Size bound to vitality. Shards are slightly longer than the
                // circle was tall, because the eye reads shards along their
                // long axis.
                const vLen  = 9 + p.vitality * 14;   // long axis (outward)
                const vWid  = 5 + p.vitality * 7;    // short axis (across branch)
                const typeClass = p.type.toLowerCase();

                // Tilt: angle of the branch's exit direction at the tip,
                // so each shard points outward along its own branch.
                const dx = p.x - p.anchorX;
                const dy = p.y - p.anchorY;
                const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI + 90;
                // +90 because the shard's local "outward" axis is +Y (down)
                // and we want it aligned with the branch's exit direction.

                // Shard path in local coordinates centred on (p.x, p.y).
                // Vertices:
                //   top (outward)   = (0, +vLen)
                //   right (side)    = (+vWid * 0.55, +vLen * 0.15)
                //   bottom (inward) = (0, -vLen * 0.6)
                //   left (side)     = (-vWid * 0.55, +vLen * 0.15)
                // The asymmetry (+0.15 bias) makes it a kite, not a rhombus.
                const x = p.x, y = p.y;
                const topX    = x,               topY    = y + vLen;
                const rightX  = x + vWid * 0.55, rightY  = y + vLen * 0.15;
                const botX    = x,               botY    = y - vLen * 0.6;
                const leftX   = x - vWid * 0.55, leftY   = y + vLen * 0.15;
                const shardD = `M ${topX} ${topY} L ${rightX} ${rightY} L ${botX} ${botY} L ${leftX} ${leftY} Z`;

                // Highlight facet — thin line from top vertex to left vertex,
                // suggesting light catching one face of the crystal.
                const facetD = `M ${topX} ${topY} L ${leftX} ${leftY}`;

                // Invisible hit area (larger than the shard) so small shards
                // are still comfortable to hover and click.
                const hitR = Math.max(vLen, 14);

                return `
                    <g class="tree-node-group ${typeClass}" data-id="${p.id}" transform="rotate(${angleDeg.toFixed(2)} ${p.x} ${p.y})">
                        <circle class="tree-node-hit" cx="${p.x}" cy="${p.y}" r="${hitR}"/>
                        <path class="tree-node-shard tree-node ${typeClass}" d="${shardD}">
                            <title>${esc(p.name)}</title>
                        </path>
                        <path class="tree-node-facet" d="${facetD}"/>
                    </g>
                    <text class="tree-node-label" x="${p.x}" y="${p.y + vLen + 18}" data-label-for="${p.id}">${esc(truncate(p.name, 22))}</text>
                `;
            }).join('');

            // Soil divider line
            const soilY = trunkMid + 10;
            const soilSvg = `
                <line class="tree-soil" x1="${60}" y1="${soilY}" x2="${W - 60}" y2="${soilY}"/>
                <text class="tree-soil-label" x="${W - 60}" y="${soilY - 6}" text-anchor="end">soil line</text>
            `;

            // Trunk centre — name + stats
            const username = currentUser?.username || 'you';
            const trunkLabelSvg = `
                <text class="tree-trunk-label" x="${cx}" y="${trunkTop - 30}">${esc(username)}</text>
                <text class="tree-trunk-sublabel" x="${cx}" y="${trunkTop - 12}">the tree</text>

                <text class="tree-trunk-stat-value" x="${cx - 18}" y="${trunkMid - 4}" text-anchor="end">${dashboard.avgVitality.toFixed(2)}</text>
                <text class="tree-trunk-stat" x="${cx - 18}" y="${trunkMid + 12}" text-anchor="end">vitality</text>

                <text class="tree-trunk-stat-value" x="${cx + 18}" y="${trunkMid - 4}">₹${dashboard.monthlyBurn.toLocaleString()}</text>
                <text class="tree-trunk-stat" x="${cx + 18}" y="${trunkMid + 12}">monthly burn</text>

                <text class="tree-trunk-sublabel" x="${cx}" y="${trunkBottom + 26}">${dashboard.totalNodes} living nodes</text>
            `;

            // Aurora gradient (defs) — animated by stop offset oscillation
            const defs = `
                <defs>
                    <linearGradient id="aurora-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%"  stop-color="#7FFFB0">
                            <animate attributeName="stop-color" values="#7FFFB0;#9FE8FF;#C9A8FF;#7FFFB0" dur="6s" repeatCount="indefinite"/>
                        </stop>
                        <stop offset="50%" stop-color="#9FE8FF">
                            <animate attributeName="stop-color" values="#9FE8FF;#C9A8FF;#7FFFB0;#9FE8FF" dur="6s" repeatCount="indefinite"/>
                        </stop>
                        <stop offset="100%" stop-color="#C9A8FF">
                            <animate attributeName="stop-color" values="#C9A8FF;#7FFFB0;#9FE8FF;#C9A8FF" dur="6s" repeatCount="indefinite"/>
                        </stop>
                    </linearGradient>
                </defs>
            `;

            el.innerHTML = `
                <div class="tree-page">
                    <div class="tree-header">
                        <div class="page-title">Your tree</div>
                        <div class="page-subtitle">a living read on what's growing, what's draining, what's been forgotten — click any leaf to bring it alive</div>
                    </div>
                    <div class="tree-svg-wrap">
                        <svg class="tree-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
                            ${defs}
                            ${soilSvg}
                            <path class="tree-trunk" d="${trunkPath}"/>
                            <g class="tree-branches">${branchSvg}</g>
                            <g class="tree-link-arcs"></g>
                            <g class="tree-nodes">${nodeSvg}</g>
                            ${trunkLabelSvg}
                        </svg>
                    </div>
                </div>
                <div class="tree-modal-backdrop" id="tree-backdrop"></div>
                <div class="tree-modal" id="tree-modal"></div>
            `;

            // Wire interaction — layered tiers:
            //   hover         = subtle preview (branch + node brighten, no arcs, no modal)
            //   single click  = full select (branch + arcs + sympathetic, sticky, no modal)
            //   double click  = open modal with details
            let clickTimer = null;
            let previewId = null;

            el.querySelectorAll('.tree-node-group').forEach(g => {
                const id = parseInt(g.dataset.id, 10);

                g.addEventListener('mouseenter', () => {
                    if (treeState.activeId === id) return;
                    previewId = id;
                    enterPreview(id);
                });
                g.addEventListener('mouseleave', () => {
                    if (treeState.activeId === id) return;
                    if (previewId === id) previewId = null;
                    exitPreview(id);
                });

                g.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    // Wait briefly to see if a second click is coming
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                        clickTimer = null;
                        return;
                    }
                    clickTimer = setTimeout(() => {
                        clickTimer = null;
                        // Preview mode is on; upgrade to full select
                        exitPreview(id);
                        activateNode(id, false);  // sticky select, no modal
                    }, 220);
                });

                g.addEventListener('dblclick', (ev) => {
                    ev.stopPropagation();
                    if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
                    exitPreview(id);
                    activateNode(id, true);  // full select AND open modal
                });
            });

            // Click on empty SVG space to dismiss
            el.querySelector('.tree-svg').addEventListener('click', (ev) => {
                if (ev.target.tagName === 'svg' || ev.target.classList.contains('tree-svg')) {
                    deactivateAll();
                    closeModal();
                }
            });

            $('#tree-backdrop').addEventListener('click', () => {
                closeModal();
            });
        }

        // Subtle hover preview — brighten branch + node, no arcs, no modal
        function enterPreview(id) {
            const nodeGroup = document.querySelector(`.tree-node-group[data-id="${id}"]`);
            const branch = document.getElementById('branch-' + id);
            if (nodeGroup) nodeGroup.classList.add('preview');
            if (branch) branch.classList.add('hover');
        }
        function exitPreview(id) {
            const nodeGroup = document.querySelector(`.tree-node-group[data-id="${id}"]`);
            const branch = document.getElementById('branch-' + id);
            if (nodeGroup) nodeGroup.classList.remove('preview');
            if (branch) branch.classList.remove('hover');
        }

        function layoutHalf({ nodes, cx, anchorY, tipYStart, tipYEnd, spread, upward }) {
            // Nodes are split into left/right alternating columns. The
            // first node goes left, the second right, etc. Each side
            // climbs (or descends) along its own y-axis from start to end.
            const out = [];
            const left  = nodes.filter((_, i) => i % 2 === 0);
            const right = nodes.filter((_, i) => i % 2 === 1);

            const placeSide = (subset, sideMul) => {
                if (subset.length === 0) return;
                const totalSlots = Math.max(subset.length, 1);
                subset.forEach((n, i) => {
                    // t goes from 0 (closest to trunk) to 1 (furthest tip)
                    const t = totalSlots === 1 ? 0.5 : i / (totalSlots - 1);
                    // x spreads from inner (close to trunk) to outer (far)
                    const innerX = cx + sideMul * 60;
                    const outerX = cx + sideMul * (spread / 2 + 80);
                    const x = innerX + (outerX - innerX) * (0.3 + 0.7 * t);
                    // y climbs from tipYStart toward tipYEnd
                    const y = tipYStart + (tipYEnd - tipYStart) * t;
                    // anchor: where this branch leaves the trunk
                    const anchorX = cx + sideMul * 4;
                    out.push({
                        id: n.id, type: n.type, name: n.name,
                        vitality: n.vitality, accent: n.accent,
                        x, y,
                        anchorX, anchorY,
                        left: sideMul < 0,
                    });
                });
            };

            placeSide(left,  -1);
            placeSide(right, +1);
            return out;
        }

        function activateNode(id, openDetails) {
            const node = treeState.byId[id];
            if (!node) return;

            // Reset previous active state
            deactivateAll();

            treeState.activeId = id;

            // Light up the node and its branch
            const nodeGroup = document.querySelector(`.tree-node-group[data-id="${id}"]`);
            const branch = document.getElementById('branch-' + id);
            if (nodeGroup) {
                nodeGroup.classList.add('active');
            }
            if (branch) branch.classList.add('active');

            // Sympathetic activation for TF-IDF linked nodes
            const links = treeState.edgesByNode[id] || [];
            const arcLayer = document.querySelector('.tree-link-arcs');
            arcLayer.innerHTML = '';
            const me = treeState.paintedNodes.find(p => p.id === id);
            if (me) {
                for (const link of links) {
                    const otherNode = document.querySelector(`.tree-node-group[data-id="${link.other}"]`);
                    const otherBranch = document.getElementById('branch-' + link.other);
                    if (otherNode) {
                        otherNode.classList.add('sympathetic');
                    }
                    if (otherBranch) otherBranch.classList.add('sympathetic');

                    // Draw an arc through the canopy connecting the two
                    const otherPos = treeState.paintedNodes.find(p => p.id === link.other);
                    if (otherPos) {
                        const midX = (me.x + otherPos.x) / 2;
                        const midY = Math.min(me.y, otherPos.y) - 80 - Math.abs(me.x - otherPos.x) * 0.15;
                        const d = `M ${me.x} ${me.y} Q ${midX} ${midY}, ${otherPos.x} ${otherPos.y}`;
                        const arc = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        arc.setAttribute('d', d);
                        arc.setAttribute('class', 'tree-link-arc visible');
                        arcLayer.appendChild(arc);
                    }
                }
            }

            if (openDetails) {
                openModal(node, links);
            }
        }

        function deactivateAll() {
            document.querySelectorAll('.tree-branch').forEach(b => {
                b.classList.remove('active', 'sympathetic', 'hover');
            });
            document.querySelectorAll('.tree-node-group').forEach(g => {
                g.classList.remove('active', 'sympathetic', 'preview');
            });
            const arcLayer = document.querySelector('.tree-link-arcs');
            if (arcLayer) arcLayer.innerHTML = '';
            treeState.activeId = null;
        }

        function openModal(node, links) {
            const modal = $('#tree-modal');

            const linkRows = links
                .sort((a, b) => b.sim - a.sim)
                .slice(0, 6)
                .map(link => {
                    const other = treeState.byId[link.other];
                    if (!other) return '';
                    return `
                        <div class="linked-row" data-id="${other.id}">
                            <span>${esc(other.name)}</span>
                            <span class="linked-strength">${(link.sim * 100).toFixed(0)}%</span>
                        </div>
                    `;
                }).join('') || '<div style="color:var(--dust); font-size:var(--text-xs); font-style:italic;">no semantic neighbours</div>';

            modal.innerHTML = `
                <button class="tree-modal-close" onclick="closeModal()">×</button>
                <div class="tree-modal-eyebrow">${node.type} · ${node.band}</div>
                <div class="tree-modal-name">${esc(node.name)}</div>
                <div class="tree-modal-meta">
                    <div>
                        <div class="tree-modal-meta-label">VITALITY</div>
                        <div class="tree-modal-meta-value">${node.vitality.toFixed(2)}</div>
                    </div>
                    <div>
                        <div class="tree-modal-meta-label">JOY</div>
                        <div class="tree-modal-meta-value">${node.joyScore.toFixed(2)}</div>
                    </div>
                </div>
                <div class="tree-modal-section-title">SEMANTIC NEIGHBOURS</div>
                <div class="tree-modal-linked">${linkRows}</div>
                <div class="tree-modal-section-title" style="margin-top: 32px;">EDIT</div>
                <div style="color: var(--dust); font-size: var(--text-xs); line-height: 1.7;">
                    open ${node.type === 'SUB' ? 'Subscriptions' : node.type === 'REPO' ? 'Repositories' : 'Ideas'} in the sidebar to edit this node, or double-click another leaf to explore.
                </div>
            `;

            // Wire linked-row clicks — single click = select that node (no modal)
            modal.querySelectorAll('.linked-row').forEach(r => {
                r.addEventListener('click', () => {
                    const id = parseInt(r.dataset.id, 10);
                    activateNode(id, false);
                });
            });

            modal.classList.add('visible');
        }

        function closeModal() {
            $('#tree-modal')?.classList.remove('visible');
            // Keep the current selection — just close the details panel.
            // User can click empty space to fully deselect.
        }

        // ============================================================
        //  Cognitive Map (static SVG render — force simulation later)
        // ============================================================
        async function renderHeatmap(el) {
            const data = await api('GET', '/api/heatmap');
            if (!data) return;

            const W = 1000, H = 600;
            const cx = W / 2, cy = H / 2;
            const radius = 240;
            const positioned = data.nodes.map((n, i) => {
                const angle = (i / data.nodes.length) * Math.PI * 2 - Math.PI / 2;
                return { ...n, x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius };
            });
            const byId = Object.fromEntries(positioned.map(n => [n.id, n]));

            const edgeSvg = data.edges.map(e => {
                const a = byId[e.source], b = byId[e.target];
                if (!a || !b) return '';
                return `<line class="heatmap-edge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
                        stroke-opacity="${0.15 + e.similarity * 0.6}" stroke-width="${0.5 + e.similarity * 2}" />`;
            }).join('');

            const nodeSvg = positioned.map(n => {
                const r = 6 + n.vitality * 12;
                return `
                    <circle class="heatmap-node" cx="${n.x}" cy="${n.y}" r="${r}"
                            fill="${n.accent}33" stroke="${n.accent}" stroke-width="1.5" />
                    <text class="heatmap-label" x="${n.x + r + 6}" y="${n.y + 4}">${esc(truncate(n.name, 22))}</text>
                `;
            }).join('');

            el.innerHTML = `
                <div class="page-header">
                    <div class="page-title">Cognitive map</div>
                    <div class="page-subtitle">TF-IDF cosine similarity over ${data.nodes.length} nodes — ${data.edges.length} edges discovered</div>
                </div>
                <div class="heatmap-wrap">
                    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
                        ${edgeSvg}
                        ${nodeSvg}
                    </svg>
                </div>
                <div style="color: var(--dust); font-size: var(--text-xs); margin-top: 16px; font-style: italic;">
                    nothing told the system these things were related — it inferred the links from text similarity alone.
                </div>
            `;
        }

        function truncate(s, n) {
            return s.length > n ? s.slice(0, n - 1) + '…' : s;
        }

        // ============================================================
        //  Pulse animation (CSS keyframes injected dynamically)
        // ============================================================
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { transform: scale(1); opacity: 0.85; }
                50% { transform: scale(1.08); opacity: 1; }
            }
        `;
        document.head.appendChild(style);

        // ============================================================
        //  Init
        // ============================================================
        initGuilloche();

        $('#login-btn').addEventListener('click', attemptLogin);
        $('#login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
        $('#login-user').addEventListener('keydown', e => { if (e.key === 'Enter') $('#login-pass').focus(); });
        $('#login-confirm').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
        $('#login-mode-toggle').addEventListener('click', (e) => {
            e.preventDefault();
            setLoginMode(loginMode === 'signin' ? 'signup' : 'signin');
        });
        $('#logout-btn').addEventListener('click', logout);
        $$('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => navigate(btn.dataset.view));
        });

        // Check whether Google OAuth is configured server-side — only show
        // the button if credentials are present. No point teasing a button
        // that would redirect to an error page.
        fetch('/api/auth/google/status')
            .then(r => r.json())
            .then(s => {
                if (s && s.configured) {
                    $('#oauth-divider').style.display = 'flex';
                    $('#google-btn').style.display = 'flex';
                }
            })
            .catch(() => {/* ignore — button stays hidden */});

        // If we were redirected back from Google with a session token in
        // the URL fragment, pick it up, clear the fragment from history,
        // and log the user in. Fragments are client-side only — the token
        // never touches any server or referer header.
        (function handleGoogleCallbackFragment() {
            if (!window.location.hash || !window.location.hash.includes('google-auth=')) return;
            const params = new URLSearchParams(window.location.hash.substring(1));
            const gToken   = params.get('google-auth');
            const username = params.get('username');
            const role     = params.get('role');
            const isFresh  = params.get('fresh') === '1';
            if (!gToken || !username) return;
            // Match the same post-login setup that attemptLogin does:
            // set the module-level `token` and `currentUser`, then enterApp.
            token = gToken;
            currentUser = { token: gToken, username, role, userId: null };
            // Clean the URL so the token isn't visible in browser history
            history.replaceState(null, '', window.location.pathname + window.location.search);
            enterApp();
            // If this is their first Google sign-in, show a welcome overlay
            // so they know a Roots account was created for them — and
            // guide them to scan a vault to get started.
            if (isFresh) {
                setTimeout(() => showFreshGoogleWelcome(username), 400);
            }
        })();

        function showFreshGoogleWelcome(username) {
            // Build a simple, dismissable welcome banner at the top of the
            // content area. Uses existing color tokens so it matches the
            // rest of the UI aesthetic.
            const existing = document.getElementById('fresh-welcome');
            if (existing) existing.remove();
            const banner = document.createElement('div');
            banner.id = 'fresh-welcome';
            banner.className = 'fresh-welcome';
            banner.innerHTML = `
                <div class="fresh-welcome-inner">
                    <div class="fresh-welcome-title">Welcome to Roots, ${esc(username)}.</div>
                    <div class="fresh-welcome-body">
                        We created a fresh Roots account linked to your Google sign-in. Your data
                        stays on this machine — Google is only used to identify you.
                        Get started by scanning your Obsidian vault and extracting your first skills.
                    </div>
                    <div class="fresh-welcome-actions">
                        <button class="btn btn-accent" onclick="navigate('vault'); dismissFreshWelcome();">SCAN A VAULT →</button>
                        <button class="btn" onclick="dismissFreshWelcome();">DISMISS</button>
                    </div>
                </div>
            `;
            document.body.appendChild(banner);
        }

        function dismissFreshWelcome() {
            const el = document.getElementById('fresh-welcome');
            if (el) el.remove();
        }

        function startGoogleAuth() {
            // Navigate the top-level window to the server's OAuth start
            // endpoint, which 302-redirects to Google's consent screen.
            window.location.href = '/auth/google/start';
        }
    </script>
</body>
